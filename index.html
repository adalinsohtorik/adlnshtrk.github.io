<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Adalin Sohtorik</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  background:#f5efe6;
  color:#3b0d19;
  font-family:'Cormorant Garamond', serif;
}

/* CONTAINER */

.container{
  max-width:1100px;
  margin:auto;
  padding:70px 20px;

  opacity:0;
  transform:translateY(40px);
  transition:1s ease;
}

.container.show{
  opacity:1;
  transform:translateY(0);
}

/* BUTTONS */

.top-buttons{
  display:flex;
  gap:15px;
  justify-content:center;
  flex-wrap:wrap;
  margin-top:30px;
}

.btn{
  padding:12px 22px;
  text-decoration:none;
  border-radius:30px;
  font-size:15px;
  transition:0.3s;
  border:1px solid #5a0f1c;
  color:#5a0f1c;
}

.btn:hover{
  background:#5a0f1c;
  color:#fff;
}

/* Seans butonu */

.btn.primary{
  background:#5a0f1c;
  color:#fff;
}

/* Telegram butonu */

.btn.telegram{
  border:1px solid #0088cc;
  color:#0088cc;
}

.btn.telegram:hover{
  background:#0088cc;
  color:#fff;
}

</style>
</head>

<body>

<div class="container show">

  <h1 style="text-align:center; font-family:'Playfair Display', serif;">
    Adalin Sohtorik
  </h1>

  <!-- BUTONLAR -->
  <div class="top-buttons">

    <a href="https://t.me/numerolojik" target="_blank" class="btn telegram">
      Özel İçerik
    </a>

    <a href="blog.html" class="btn">
      Blog
    </a>

    <a href="https://www.advicemy.com/danisman/adalin-sohtorik" class="btn primary">
      Seans Oluştur
    </a>

  </div>

</div>

</body>
</html>
